<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The 2026 Gallery · Hillside</title>
  <meta name="description" content="A gallery from the inaugural Hillside gala — 02 May 2026, The Bowery Hotel.">
  <link rel="stylesheet" href="./colors_and_type.css?v=20260509-19">
  <link rel="stylesheet" href="site.css?v=20260509-19">
  <link rel="stylesheet" href="subpage.css?v=20260509-19">
  <link rel="stylesheet" href="gallery.css?v=20260509-19">
</head>
<body class="gallery-page subpage">
  <header class="subpage__nav">
    <a href="index.html" class="subpage__back" aria-label="Back to Hillside">
      <span aria-hidden="true">←</span> <span>Back</span>
    </a>
    <a href="index.html" class="subpage__mark" aria-label="Hillside home">
      <img src="./assets/logos/hillside-wordmark-white.png" alt="Hillside" />
    </a>
    <span class="subpage__crumb">02 May 2026</span>
  </header>

  <section class="gallery-page__hero">
    <div class="container">
      <span class="label">The 2026 event</span>
      <h1 class="gallery-page__title">
        The room.<br/>The night.<br/>The people in it.
      </h1>
      <p class="gallery-page__sub">
        Photography by Ricky Rodriguez · The Bowery Hotel · 02 May 2026
      </p>
    </div>
  </section>

  <main class="gallery-grid" id="grid" aria-label="Photo gallery"></main>

  <a href="index.html" class="back-fab" id="backFab" aria-label="Back to Hillside">
    <span aria-hidden="true">←</span> Back to Hillside
  </a>

  <footer class="gallery-page__foot">
    <div class="container">
      <a href="index.html" class="btn--quiet">Return to Hillside <span aria-hidden="true">→</span></a>
    </div>
  </footer>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-hidden="true">
    <button class="lightbox__close" id="lbClose" aria-label="Close">
      <span aria-hidden="true">×</span>
    </button>
    <button class="lightbox__nav lightbox__nav--prev" id="lbPrev" aria-label="Previous photo">
      <span aria-hidden="true">‹</span>
    </button>
    <button class="lightbox__nav lightbox__nav--next" id="lbNext" aria-label="Next photo">
      <span aria-hidden="true">›</span>
    </button>
    <figure class="lightbox__stage">
      <img class="lightbox__img" id="lbImg" alt="" />
      <figcaption class="lightbox__cap" id="lbCap"></figcaption>
    </figure>
  </div>

  <script>
    (async function () {
      const grid = document.getElementById('grid');
      const manifest = await fetch('./assets/gallery/manifest.json').then(r => r.json());
      manifest.forEach((m, i) => {
        const fig = document.createElement('figure');
        fig.className = 'gallery-item';
        fig.style.setProperty('--aspect', m.aspect);
        fig.dataset.index = i;
        const img = document.createElement('img');
        img.loading = i < 6 ? 'eager' : 'lazy';
        img.decoding = 'async';
        img.src = './assets/gallery/' + m.thumb;
        img.alt = 'Photograph ' + (i + 1) + ' from the Hillside 2026 gala.';
        img.width = m.w;
        img.height = m.h;
        fig.appendChild(img);
        grid.appendChild(fig);
      });

      // Lightbox
      const lb = document.getElementById('lightbox');
      const lbImg = document.getElementById('lbImg');
      const lbCap = document.getElementById('lbCap');
      let idx = 0;

      function open(i) {
        idx = i;
        const m = manifest[idx];
        lbImg.src = './assets/gallery/' + m.full;
        lbImg.alt = 'Photograph ' + (idx + 1) + ' of ' + manifest.length;
        lbCap.textContent = (idx + 1) + ' / ' + manifest.length + ' · Photography by Ricky Rodriguez';
        lb.setAttribute('aria-hidden', 'false');
        lb.classList.add('is-open');
        document.body.style.overflow = 'hidden';
      }
      function close() {
        lb.setAttribute('aria-hidden', 'true');
        lb.classList.remove('is-open');
        lbImg.src = '';
        document.body.style.overflow = '';
      }
      function prev() { open((idx - 1 + manifest.length) % manifest.length); }
      function next() { open((idx + 1) % manifest.length); }

      grid.addEventListener('click', (e) => {
        const fig = e.target.closest('.gallery-item');
        if (!fig) return;
        open(parseInt(fig.dataset.index, 10));
      });
      document.getElementById('lbClose').addEventListener('click', close);
      document.getElementById('lbPrev').addEventListener('click', prev);
      document.getElementById('lbNext').addEventListener('click', next);
      lb.addEventListener('click', (e) => { if (e.target === lb) close(); });
      document.addEventListener('keydown', (e) => {
        if (lb.getAttribute('aria-hidden') === 'true') return;
        if (e.key === 'Escape') close();
        if (e.key === 'ArrowLeft') prev();
        if (e.key === 'ArrowRight') next();
      });

      // Fade-in on scroll
      const io = new IntersectionObserver((entries) => {
        entries.forEach((e) => {
          if (e.isIntersecting) {
            e.target.classList.add('is-in');
            io.unobserve(e.target);
          }
        });
      }, { threshold: 0.08 });
      document.querySelectorAll('.gallery-item').forEach((el) => io.observe(el));

      // Show floating back button after a short scroll
      const backFab = document.getElementById('backFab');
      function checkScroll() {
        if (window.scrollY > 240) backFab.classList.add('is-visible');
        else backFab.classList.remove('is-visible');
      }
      window.addEventListener('scroll', checkScroll, { passive: true });
      checkScroll();
    })();
  </script>
</body>
</html>
